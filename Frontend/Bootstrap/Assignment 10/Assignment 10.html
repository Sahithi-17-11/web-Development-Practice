<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="Assignment 10.css">
    <title>Document</title>
</head>
<body>
    <div class="container py-5 my-5">
        <form>
        <div class="row py-2">
            <div class="col-sm-6">
                <label class="form-label" for="email">Email</label>
                <input class="form-control" type="text" name="email" id="email">
            </div>
            <div class="col-sm-6">
                <label class="form-label" for="phone">Password</label>
                <input class="form-control" type="password" name="phone" id="phone">
            </div>
        </div>
        <div class="row py-2">
            <div class="col-sm-12">
                <label for="add" class="form-label" >Address</label>
                <input class="form-control" type="text" name="add" id="add" placeholder="1234 Main St">
            </div>
        </div>
        <div class="row py-2">
            <div class="col-sm-12">
                <label for="add2" class="form-label">Address 2</label>
                <input placeholder="Apartment, studio, or floor" class="form-control" type="text" name="add2" id="add2">
            </div>
        </div>
        <div class="row py-2">
            <div class="col-sm-6">
                <label for="city" class="form-label">City</label>
                <input placeholder="City" class="form-control" type="text" name="city" id="city">
            </div>
            <div class="col-sm-4">
                <label for="state" class="form-label">State</label>
                <select name="state" id="state" class="form-select">
                    <option selected disabled value="">Choose...</option>
                    <option value="">Ts</option>
                    <option value="">Ap</option>
                    <option value="">TN</option>
                </select>
            </div>
            <div class="col-sm-2">
                <label for="zip" class="form-label">Zip</label>
                <input class="form-control" type="number" name="zip" id="zip">
            </div>
        </div>
        <div class="form-check py-2">
            <input class="form-check-input" type="checkbox" name="checkme" id="checkme">
            <label for="checkme" class="form-check-label">Check me out</label>
        </div>
        <button class="btn bg-primary text-light py-2">Sign in</button>
        </form>
    </div>
</body>
</html>
